apiVersion: v1
kind: Service
metadata:
  name: mysql-external
  labels:
    app: mysql
    type: external
spec:
  type: ExternalName
  externalName: placeholder.mysql.com  # 会被环境覆盖
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mysql-external
subsets:
- addresses:
  - ip: 192.168.103.250 # 会被环境覆盖
  ports:
  - port: 3306
