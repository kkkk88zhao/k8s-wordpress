apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app: wordpress
  managed-by: kustomize

resources:
- deployment.yaml
- service.yaml
- configmap.yaml

secretGenerator:
- name: wordpress-secrets
  literals:
  - auth-key=placeholder
  - secure-auth-key=placeholder
  - logged-in-key=placeholder
  - nonce-key=placeholder
  - auth-salt=placeholder
  - secure-auth-salt=placeholder
  - logged-in-salt=placeholder
  - nonce-salt=placeholder
