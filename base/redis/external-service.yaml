apiVersion: v1
kind: Service
metadata:
  name: redis-external
  labels:
    app: redis
    type: external
spec:
  type: ExternalName
  externalName: placeholder.redis.com
---
apiVersion: v1
kind: Endpoints
metadata:
  name: redis-external
subsets:
- addresses:
  - ip: 192.168.1.101
  ports:
  - port: 6379
